name: "🤖 Autonomous PR Pipeline"

# Auto-review and merge PRs in creative-ware-hq
# - Classifies risk using .github/scripts/classify-risk.js
# - Blocks auto-merge unless all required CI checks are green
# - low (docs/tests/comments): auto-merge after 2-min soak
# - medium: auto-merge after 10-min soak + all checks green
# - high: block, label needs-owner-approval, assign owner

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: read
  checks: read
  statuses: read

jobs:
  # ── Auto-ready copilot draft PRs ──
  auto-ready-drafts:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft &&
      startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Mark copilot draft PR as ready
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            console.log(`Auto-readying copilot draft PR #${pr.number}`);
            await github.graphql(`
              mutation($id: ID!) {
                markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                  pullRequest { number }
                }
              }
            `, { id: pr.node_id });

  classify-and-review:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: Classify and label PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const ws = process.env.GITHUB_WORKSPACE;
            const cfg = require(`${ws}/.github/scripts/agent-config.js`);
            const { classifyRisk } = require(`${ws}/.github/scripts/classify-risk.js`);

            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: pr.number, per_page: 100,
            });
            const filePaths = files.map(f => f.filename);

            const existingLabels = (pr.labels || []).map(l => l.name);
            const riskTier = classifyRisk({
              title: pr.title,
              body: pr.body || '',
              files: filePaths,
              labels: existingLabels,
            });

            core.setOutput('risk_level', riskTier);
            console.log(`PR #${pr.number}: risk=${riskTier} files=${filePaths.length}`);

            // Apply risk label
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number,
                labels: [`risk/${riskTier}`],
              });
            } catch {}

            // High risk: block and assign owner
            if (riskTier === 'high') {
              const ownerLogin = cfg.getOwner();
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: pr.number,
                  labels: ['needs-owner-approval'],
                });
              } catch {}
              const matchedPaths = filePaths.filter(f =>
                cfg.getClassifyRules().high_paths.some(p => {
                  const regexStr = p.replace(/[.+^${}()|[\]]/g, '\\$&')
                    .replace(/\*\*/g, '__DS__').replace(/\*/g, '[^/]*').replace(/__DS__/g, '.*');
                  return new RegExp(`^${regexStr}$`).test(f);
                })
              );
              const matchedKeywords = cfg.getClassifyRules().high_keywords.filter(kw =>
                `${pr.title} ${pr.body || ''}`.toLowerCase().includes(kw.toLowerCase())
              );
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body: [
                  `## 🛑 High-Risk PR — Owner Approval Required`,
                  ``,
                  `This PR has been classified as **high-risk** and cannot be auto-merged.`,
                  ``,
                  matchedPaths.length > 0 ? `**Matched high-risk paths:** ${matchedPaths.join(', ')}` : '',
                  matchedKeywords.length > 0 ? `**Matched high-risk keywords:** ${matchedKeywords.join(', ')}` : '',
                  ``,
                  `@${ownerLogin} — please review and approve or reject this PR.`,
                  ``,
                  `> To route to the agent committee instead, remove \`needs-owner-approval\` and add \`committee-vote\`.`,
                  ``,
                  `---`,
                  `*CreativeWare Autonomous PR Pipeline*`,
                ].filter(Boolean).join('\n'),
              });
              try {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number: pr.number, assignees: [ownerLogin],
                });
              } catch {}
            }

  auto-merge:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: Auto-approve and merge safe PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const ws = process.env.GITHUB_WORKSPACE;
            const cfg = require(`${ws}/.github/scripts/agent-config.js`);
            const { classifyRisk } = require(`${ws}/.github/scripts/classify-risk.js`);
            const { recordOutcome } = require(`${ws}/.github/scripts/record-outcome.js`);

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 30,
            });

            if (openPRs.length === 0) {
              console.log('No open PRs');
              return;
            }

            // Auto-ready copilot draft PRs on scheduled sweep
            if (context.eventName === 'schedule') {
              for (const pr of openPRs) {
                if (pr.draft && pr.head.ref.startsWith('copilot/')) {
                  try {
                    await github.graphql(`
                      mutation($id: ID!) {
                        markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                          pullRequest { number }
                        }
                      }
                    `, { id: pr.node_id });
                    console.log(`📋 Auto-readied draft copilot PR #${pr.number}`);
                  } catch (e) {
                    console.log(`Could not ready PR #${pr.number}: ${e.message}`);
                  }
                }
              }
            }

            // Circuit breaker: max auto-merges per day
            const maxMerges = cfg.getMaxAutoMergesPerDay();
            const today = new Date().toISOString().split('T')[0];
            const { data: recentlyMerged } = await github.rest.pulls.list({
              owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 20,
            });
            const todayMerged = recentlyMerged.filter(pr =>
              pr.merged_at && pr.merged_at.startsWith(today)
            );
            if (todayMerged.length >= maxMerges) {
              console.log(`🛑 CIRCUIT BREAKER: ≥${maxMerges} merges today`);
              return;
            }

            for (const pr of openPRs) {
              if (pr.draft) continue;

              // Fetch PR details and changed files for classification
              const { data: prDetail } = await github.rest.pulls.get({
                owner, repo, pull_number: pr.number,
              });

              const { data: prFiles } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr.number, per_page: 100,
              });
              const filePaths = prFiles.map(f => f.filename);
              const prLabels = (prDetail.labels || []).map(l => l.name);

              // Skip high-risk PRs — those need owner approval
              if (prLabels.includes('needs-owner-approval')) {
                console.log(`PR #${pr.number}: blocked — needs-owner-approval`);
                continue;
              }

              const riskTier = classifyRisk({
                title: prDetail.title,
                body: prDetail.body || '',
                files: filePaths,
                labels: prLabels,
              });

              if (riskTier === 'high') {
                console.log(`PR #${pr.number}: high-risk — skipping auto-merge`);
                continue;
              }

              // Soak window: low=2min, medium=10min
              const soakMinutes = riskTier === 'low' ? 2 : 10;
              const minutesSincePush = (Date.now() - new Date(pr.updated_at).getTime()) / 60000;
              if (minutesSincePush < soakMinutes) {
                console.log(`PR #${pr.number}: soak window (${Math.round(minutesSincePush)}m < ${soakMinutes}m, tier=${riskTier})`);
                continue;
              }

              // Check CI: combined status + check runs
              const sha = prDetail.head.sha;

              // Combined status
              let statusOk = true;
              try {
                const { data: status } = await github.rest.repos.getCombinedStatusForRef({
                  owner, repo, ref: sha,
                });
                if (status.state === 'failure' || status.state === 'error') {
                  console.log(`PR #${pr.number}: CI status=${status.state} — skipping`);
                  statusOk = false;
                } else if (status.state === 'pending') {
                  console.log(`PR #${pr.number}: CI pending — skipping (will retry)`);
                  continue;
                }
              } catch (e) {
                console.log(`PR #${pr.number}: Could not get status: ${e.message}`);
              }
              if (!statusOk) continue;

              // Check runs
              try {
                const { data: checkRuns } = await github.rest.checks.listForRef({
                  owner, repo, ref: sha, per_page: 50,
                });
                const runs = checkRuns.check_runs || [];
                const pending = runs.filter(r => r.status !== 'completed');
                const failed = runs.filter(r =>
                  r.status === 'completed' && r.conclusion !== 'success' && r.conclusion !== 'skipped' && r.conclusion !== 'neutral'
                );
                if (pending.length > 0) {
                  console.log(`PR #${pr.number}: ${pending.length} check(s) still pending — skipping`);
                  continue;
                }
                if (failed.length > 0) {
                  console.log(`PR #${pr.number}: ${failed.length} check(s) failed — skipping`);
                  continue;
                }
              } catch (e) {
                console.log(`PR #${pr.number}: Could not get check runs: ${e.message}`);
              }

              // Check mergeable state
              if (prDetail.mergeable_state === 'dirty') {
                console.log(`PR #${pr.number}: merge conflicts — skipping`);
                continue;
              }
              if (prDetail.mergeable_state === 'blocked') {
                console.log(`PR #${pr.number}: blocked by branch protection — skipping`);
                continue;
              }

              console.log(`✅ Auto-merging PR #${pr.number}: ${pr.title} [${riskTier}]`);

              try {
                await github.rest.pulls.createReview({
                  owner, repo, pull_number: pr.number,
                  event: 'APPROVE',
                  body: `🤖 **Auto-approved** by CreativeWare Autonomous PR Pipeline.\n\n**Risk tier:** \`${riskTier}\` | **Soak:** ${soakMinutes}min | **CI:** ✅`,
                });
              } catch (e) {
                console.log(`Approve note: ${e.message}`);
              }

              try {
                await github.rest.pulls.merge({
                  owner, repo, pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                  commit_message: `Auto-merged by CreativeWare Autonomous PR Pipeline.\nRisk tier: ${riskTier}\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>`,
                });
                console.log(`✅ Merged PR #${pr.number}`);
                await recordOutcome({
                  kind: 'pr-merge',
                  summary: pr.title.slice(0, 80),
                  prRef: `${repo}#${pr.number}`,
                  result: '✅ merged',
                  notes: `tier=${riskTier}`,
                });
              } catch (e) {
                console.log(`Merge failed: ${e.message}`);
                await recordOutcome({
                  kind: 'pr-merge',
                  summary: pr.title.slice(0, 80),
                  prRef: `${repo}#${pr.number}`,
                  result: '❌ merge-failed',
                  notes: `tier=${riskTier} err=${e.message.slice(0, 60)}`,
                });
              }
            }

