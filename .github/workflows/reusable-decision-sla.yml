name: reusable-decision-sla
on:
  workflow_call:
    inputs:
      repo:
        description: Repository name to scan
        required: true
        type: string
permissions:
  issues: write
  contents: read
jobs:
  sla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: cfg
        uses: fratei/creative-ware-hq/.github/actions/load-config@v1
      - id: reminder
        uses: fratei/creative-ware-hq/.github/actions/render-prompt@v1
        with:
          template_name: sla-reminder-48h
          vars_json: '{"hours_open":"48","sla_hours":"48","owner":"fratei"}'
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            console.log('Reusable decision SLA callable executed');
