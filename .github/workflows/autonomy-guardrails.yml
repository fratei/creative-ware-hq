name: "🛡️ Autonomy Guardrails"

on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: "Audit autonomy blockers"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ws = process.env.GITHUB_WORKSPACE;
            const title = '[AUTONOMY][PHASE-3] Guardrail blockers';

            const registry = JSON.parse(
              fs.readFileSync(path.join(ws, 'products', 'registry.json'), 'utf-8')
            );
            const liveRepos = registry.products
              .filter(p => p.status === 'live')
              .map(p => p.repo.replace(/^[^/]+\//, ''));

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner, repo, event: 'pull_request', per_page: 100,
            });

            const blockedRuns = [];
            const actionRequiredRuns = runs
              .filter(run => run.conclusion === 'action_required')
              .slice(0, 40);
            for (const run of actionRequiredRuns) {
              const jobs = await github.request(run.jobs_url);
              if ((jobs.data.total_count || 0) === 0) {
                blockedRuns.push({
                  id: run.id,
                  name: run.name,
                  branch: run.head_branch,
                  created: run.created_at,
                  url: run.html_url,
                });
              }
            }

            const repoAccessFailures = [];
            for (const targetRepo of liveRepos) {
              try {
                await github.rest.repos.get({ owner, repo: targetRepo });
              } catch (e) {
                repoAccessFailures.push({
                  repo: `${owner}/${targetRepo}`,
                  error: e.status ? `HTTP ${e.status}` : e.message,
                });
              }
            }

            const blockers = blockedRuns.length > 0 || repoAccessFailures.length > 0;
            const body = [
              `## Phase 3 Guardrail Audit`,
              ``,
              `Generated: ${new Date().toISOString()}`,
              ``,
              `### CI / Workflow Stability`,
              blockedRuns.length
                ? `Found **${blockedRuns.length}** PR-event runs in \`action_required\` with zero jobs.`
                : `No blocked PR-event runs detected in latest sample.`,
              ...blockedRuns.slice(0, 20).map(r =>
                `- ${r.name} (run ${r.id}, branch '${r.branch}', ${r.created}) — ${r.url}`
              ),
              ``,
              `### Cross-Repo Token Coverage (AGENT_PAT fallback path)`,
              repoAccessFailures.length
                ? `Access failures detected for **${repoAccessFailures.length}** live repo(s):`
                : `All live product repos are readable with the active token.`,
              ...repoAccessFailures.map(r => `- ${r.repo}: ${r.error}`),
              ``,
              `### Required Actions`,
              `- [ ] Ensure Actions policy allows bot PR workflows to run automatically (no manual approval gate).`,
              `- [ ] If coverage failures exist, rotate/rescope \`AGENT_PAT\` and grant all live repos.`,
              `- [ ] Keep branch protection and rulesets aligned with required CI checks.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'agent/orchestrator', per_page: 100,
            });
            const current = existing.find(i => i.title === title);

            if (!blockers) {
              if (current) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: current.number,
                  body: '✅ Guardrail check is green. Closing this blocker issue automatically.',
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: current.number, state: 'closed',
                });
              }
              return;
            }

            if (current) {
              await github.rest.issues.update({
                owner, repo, issue_number: current.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['agent/orchestrator', 'needs-owner-approval', 'security', 'auto-detected'],
              });
            }
