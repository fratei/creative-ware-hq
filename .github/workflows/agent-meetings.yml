name: "🤝 Agent Meetings — Company Coordination"

# Company-wide meeting system aggregating ALL product repos.
# - Standup: every 8 hours — cross-product status
# - Strategy review: weekly on Mondays
# - Escalation: on-demand via dispatcher

on:
  schedule:
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:
    inputs:
      meeting_type:
        description: "Type of meeting"
        type: choice
        options:
          - "standup"
          - "strategy-review"
          - "escalation"
        default: "standup"
      escalation_context:
        description: "Context for escalation"
        type: string
        default: ""
  repository_dispatch:
    types: [meeting-requested]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  standup:
    if: >-
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.meeting_type == 'standup') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.type == 'standup')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🗓️ Company Standup"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const shift = now.getUTCHours() < 8 ? 'Night' : now.getUTCHours() < 16 ? 'Morning' : 'Afternoon';
            const eightHoursAgo = new Date(Date.now() - 8 * 3600000).toISOString();

            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            const sections = [];
            let totalOpenPRs = 0, totalMerged = 0, totalBugs = 0, totalIncidents = 0, totalPending = 0;

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: openPRs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 20 });
                const { data: closedPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 10,
                });
                const merged = closedPRs.filter(pr => pr.merged_at && new Date(pr.merged_at) > new Date(eightHoursAgo));
                const { data: bugs } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'bug', per_page: 50 });
                const { data: incidents } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'incident', per_page: 10 });
                const { data: pending } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'needs-owner-approval', per_page: 20 });

                totalOpenPRs += openPRs.length;
                totalMerged += merged.length;
                totalBugs += bugs.length;
                totalIncidents += incidents.length;
                totalPending += pending.length;

                sections.push([
                  `### 📦 ${product.name} (\`${repo}\`)`,
                  `- Open PRs: ${openPRs.length} | Merged (8h): ${merged.length}`,
                  `- Bugs: ${bugs.length} | Incidents: ${incidents.length}`,
                  `- Decisions pending: ${pending.length}`,
                  pending.slice(0, 2).map(d => `  - #${d.number}: ${d.title}`).join('\n'),
                ].filter(Boolean).join('\n'));
              } catch (e) {
                sections.push(`### 📦 ${product.name} — ⚠️ scan failed`);
              }
            }

            const report = [
              `## 🗓️ Company Standup — ${shift} Shift (${today})`,
              ``,
              `### Summary`,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Products | ${products.length} |`,
              `| Open PRs | ${totalOpenPRs} |`,
              `| Merged (8h) | ${totalMerged} |`,
              `| Open Bugs | ${totalBugs} |`,
              `| Incidents | ${totalIncidents} |`,
              `| Decisions Pending | ${totalPending} |`,
              ``,
              ...sections,
              ``,
              `---`,
              `*Next standup in ~8 hours. Generated by CreativeWare HQ.*`,
            ].join('\n');

            const standupTitle = `[STANDUP] ${today}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo: hqRepo, state: 'open', labels: 'standup', per_page: 5,
            });
            const todayStandup = existing.find(i => i.title === standupTitle);

            if (todayStandup) {
              await github.rest.issues.createComment({
                owner, repo: hqRepo, issue_number: todayStandup.number, body: report,
              });
            } else {
              for (const old of existing) {
                if (old.title !== standupTitle) {
                  await github.rest.issues.update({ owner, repo: hqRepo, issue_number: old.number, state: 'closed' });
                }
              }
              await github.rest.issues.create({
                owner, repo: hqRepo, title: standupTitle, body: report,
                labels: ['standup', 'agent/orchestrator'],
              });
            }

  strategy-review:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.meeting_type == 'strategy-review') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.type == 'strategy-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "📊 Weekly Strategy Review"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
            const today = new Date().toISOString().split('T')[0];

            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            const rows = [];
            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: closed } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'closed', since: weekAgo, per_page: 50,
                });
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 30,
                });
                const merged = prs.filter(pr => pr.merged_at && pr.merged_at >= weekAgo).length;
                rows.push(`| ${product.name} | ${closed.length} | ${merged} |`);
              } catch {
                rows.push(`| ${product.name} | ? | ? |`);
              }
            }

            const report = [
              `## 📋 Weekly Strategy Review — ${today}`,
              ``,
              `### Product Performance (Last 7 Days)`,
              `| Product | Issues Closed | PRs Merged |`,
              `|---------|---------------|------------|`,
              ...rows,
              ``,
              `---`,
              `*Generated by CreativeWare HQ*`,
            ].join('\n');

            await github.rest.issues.create({
              owner, repo: hqRepo,
              title: `[REPORT] Weekly Strategy Review — ${today}`,
              body: report,
              labels: ['agent/orchestrator', 'report'],
            });

  escalation:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.meeting_type == 'escalation') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.type == 'escalation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🚨 Escalation Meeting"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ctx = context.payload.client_payload?.context ||
                         '${{ inputs.escalation_context }}' || 'No context provided';

            await github.rest.issues.create({
              owner, repo,
              title: `[ESCALATION] ${new Date().toISOString().split('T')[0]} — Cross-functional review needed`,
              body: [
                `## 🚨 Escalation Meeting`,
                `**Context:** ${ctx}`,
                ``,
                `@fratei — This item requires your decision.`,
              ].join('\n'),
              labels: ['escalation', 'needs-owner-approval'],
              assignees: ['fratei'],
            });
