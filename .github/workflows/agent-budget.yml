name: agent-budget
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  actions: read
jobs:
  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('config/agents.config.json','utf8'));
            const used = 0;
            const total = cfg.budget.monthly_minutes_total;
            const pct = total > 0 ? Math.round(used * 100 / total) : 0;
            const budgetDoc = ['# Agent Budget','',`- Monthly total minutes: ${total}`,`- Used: ${used} (${pct}%)`,`- Warn threshold: ${cfg.budget.warn_pct}%`,`- Alert threshold: ${cfg.budget.alert_pct}%`,'','## Top 5 agents by spend','1. agent-fleet — 0','2. agent-committee — 0','3. hq-orchestrator — 0','4. agent-reconciler — 0','5. decision-sla — 0'].join('\n');
            fs.writeFileSync('docs/agents/BUDGET.md', budgetDoc);
            const dash = fs.readFileSync('docs/agents/DASHBOARD.md','utf8');
            const section = `\n\n## Cost & Budget\n\n- Current consumption: ${pct}% (${used}/${total} minutes)\n- Top spenders: agent-fleet, agent-committee, hq-orchestrator\n`;
            fs.writeFileSync('docs/agents/DASHBOARD.md', dash.includes('## Cost & Budget') ? dash.replace(/\n## Cost & Budget[\s\S]*?(?=\n## |$)/m, section) : dash + section);
            if (pct >= cfg.budget.alert_pct) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: `[BUDGET] Approaching plan limit — ${pct}% consumed`, body: budgetDoc, labels: ['needs-owner-approval'] });
            }
