name: "🎯 HQ Orchestrator — Cross-Product Coordinator"

# Scans all registered products every 4 hours:
# - Aggregates issues, PRs, incidents across all products
# - Updates the cross-product dashboard
# - Identifies cross-product opportunities
# - Weekly company strategy review (Mondays)

on:
  schedule:
    - cron: "0 */8 * * *"  # Every 8 hours (reduced from 4h)
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        type: choice
        options:
          - "full-scan"
          - "dashboard-only"
          - "strategy-review"
        default: "full-scan"
  repository_dispatch:
    types: [hq-orchestrator-trigger]

permissions:
  contents: write
  issues: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: "🎯 Cross-Product Scan & Dashboard Update"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            const ws = process.env.GITHUB_WORKSPACE;
            const cfg = require(`${ws}/.github/scripts/agent-config.js`);
            const { loadState, saveState } = require(`${ws}/.github/scripts/agent-state.js`);

            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const ownerLogin = cfg.getOwner();
            const now = new Date().toISOString();
            const today = now.split('T')[0];

            // Load orchestrator state
            const state = loadState('orchestrator');

            // Read product registry (machine-readable JSON)
            const registry = JSON.parse(fs.readFileSync(path.join(ws, 'products', 'registry.json'), 'utf-8'));
            const productRepos = registry.products
              .filter(p => p.status === 'live')
              .map(p => p.repo.replace(/^[^/]+\//, ''));
            console.log(`Found ${productRepos.length} product repos: ${productRepos.join(', ')}`);

            // Scan each product
            const productStats = [];
            for (const repo of productRepos) {
              try {
                const { data: openIssues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', per_page: 100,
                });
                const { data: openPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 50,
                });
                const { data: closedPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'closed', sort: 'updated',
                  direction: 'desc', per_page: 20,
                });
                const mergedToday = closedPRs.filter(pr =>
                  pr.merged_at && pr.merged_at >= `${today}T00:00:00Z`
                ).length;

                const bugs = openIssues.filter(i => i.labels?.some(l => l.name === 'bug')).length;
                const incidents = openIssues.filter(i => i.labels?.some(l => l.name === 'incident')).length;
                const awaitingOwner = openIssues.filter(i => i.labels?.some(l => l.name === 'needs-owner-approval')).length;
                const assignmentFailed = openIssues.filter(i => i.labels?.some(l => l.name === 'assignment-failed')).length;

                // Stuck implementations: open engineering issues older than 7 days
                const stuckImpls = openIssues.filter(i => {
                  const isEng = i.labels?.some(l => l.name === 'engineering');
                  const ageDays = (Date.now() - new Date(i.created_at).getTime()) / 86400000;
                  return isEng && ageDays > 7;
                }).length;

                // Blocked PRs: open PRs with needs-owner-approval older than 24h
                const blockedPRs = openPRs.filter(pr => {
                  const hasLabel = (pr.labels || []).some(l => l.name === 'needs-owner-approval');
                  const ageHours = (Date.now() - new Date(pr.created_at).getTime()) / 3600000;
                  return hasLabel && ageHours > 24;
                }).length;

                productStats.push({
                  repo,
                  status: incidents > 0 ? '🔴 Incident' : bugs > 3 ? '🟡 Bugs' : '🟢 Healthy',
                  openIssues: openIssues.length,
                  openPRs: openPRs.length,
                  bugs,
                  incidents,
                  mergedToday,
                  awaitingOwner,
                  assignmentFailed,
                  stuckImpls,
                  blockedPRs,
                });
                console.log(`✅ ${repo}: ${openIssues.length} issues, ${openPRs.length} PRs, ${incidents} incidents`);
              } catch (e) {
                console.log(`⚠️ ${repo}: scan failed — ${e.message}`);
                productStats.push({
                  repo, status: '⚪ Error',
                  openIssues: '?', openPRs: '?', bugs: '?',
                  incidents: '?', mergedToday: '?', awaitingOwner: '?',
                  assignmentFailed: 0, stuckImpls: 0, blockedPRs: 0,
                });
              }
            }

            // ── Read autonomy metrics from outcomes ────────────────────────
            let autonomyMetrics = {
              total: 0, committeeApproved: 0, slaFallback: 0, escalated: 0,
              prsMergedLow: 0, prsMergedMed: 0, prsMergedHigh: 0,
              circuitBreakersHit: [],
            };
            try {
              const sevenDaysAgo = new Date(Date.now() - 7 * 86400000);
              const months = [
                `${now.split('-')[0]}-${now.split('-')[1]}`,
              ];
              if (new Date(today).getDate() <= 7) {
                const prev = new Date(Date.now() - 8 * 86400000);
                months.push(`${prev.getUTCFullYear()}-${String(prev.getUTCMonth() + 1).padStart(2, '0')}`);
              }
              for (const ym of months) {
                const fp = path.join(ws, 'strategy', 'outcomes', `${ym}.md`);
                if (!fs.existsSync(fp)) continue;
                const lines = fs.readFileSync(fp, 'utf-8').split('\n')
                  .filter(l => l.startsWith('|') && !l.includes('Date (UTC)') && !l.includes('---'));
                for (const line of lines) {
                  const cols = line.split('|').map(c => c.trim()).filter(Boolean);
                  if (cols.length < 5) continue;
                  const [date, kind, , , , result] = cols;
                  if (!date || new Date(date) < sevenDaysAgo) continue;
                  autonomyMetrics.total++;
                  if (kind === 'committee-approval') autonomyMetrics.committeeApproved++;
                  if (kind === 'sla-fallback-approval') autonomyMetrics.slaFallback++;
                  if (kind === 'committee-escalation') autonomyMetrics.escalated++;
                  if (kind === 'pr-merge') {
                    const notes = cols[6] || '';
                    if (notes.includes('tier=low')) autonomyMetrics.prsMergedLow++;
                    else if (notes.includes('tier=medium')) autonomyMetrics.prsMergedMed++;
                    else if (notes.includes('tier=high')) autonomyMetrics.prsMergedHigh++;
                  }
                }
              }
            } catch (e) {
              console.log(`⚠️ Could not read outcomes: ${e.message}`);
            }

            const autonomyPct = autonomyMetrics.total > 0
              ? Math.round((autonomyMetrics.committeeApproved + autonomyMetrics.slaFallback) / autonomyMetrics.total * 100)
              : 0;
            const escalatedPct = autonomyMetrics.total > 0
              ? Math.round(autonomyMetrics.escalated / autonomyMetrics.total * 100)
              : 0;

            // ── Build anomalies list ────────────────────────────────────────
            const anomalies = [];
            for (const p of productStats) {
              if (parseInt(p.assignmentFailed) > 0) {
                anomalies.push(`⚠️ **${p.repo}:** ${p.assignmentFailed} issue(s) with \`assignment-failed\``);
              }
              if (parseInt(p.stuckImpls) > 0) {
                anomalies.push(`🕐 **${p.repo}:** ${p.stuckImpls} implementation(s) stuck >7 days`);
              }
              if (parseInt(p.blockedPRs) > 0) {
                anomalies.push(`🛑 **${p.repo}:** ${p.blockedPRs} PR(s) blocked >24h (needs-owner-approval)`);
              }
            }

            // Build cross-product dashboard
            const dashboard = [
              `# 📊 CreativeWare Cross-Product Dashboard`,
              ``,
              `> Auto-updated by HQ Orchestrator every 4h. Do not edit manually.`,
              ``,
              `## Product Status`,
              ``,
              `| Product | Status | Open Issues | Open PRs | Bugs | Incidents | Merged Today | Awaiting Owner |`,
              `|---------|--------|-------------|----------|------|-----------|--------------|----------------|`,
              ...productStats.map(p =>
                `| ${p.repo} | ${p.status} | ${p.openIssues} | ${p.openPRs} | ${p.bugs} | ${p.incidents} | ${p.mergedToday} | ${p.awaitingOwner} |`
              ),
              ``,
              `## Company Totals`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Products | ${productStats.length} |`,
              `| Total Open Issues | ${productStats.reduce((s, p) => s + (parseInt(p.openIssues) || 0), 0)} |`,
              `| Total Open PRs | ${productStats.reduce((s, p) => s + (parseInt(p.openPRs) || 0), 0)} |`,
              `| Total Incidents | ${productStats.reduce((s, p) => s + (parseInt(p.incidents) || 0), 0)} |`,
              `| PRs Merged Today | ${productStats.reduce((s, p) => s + (parseInt(p.mergedToday) || 0), 0)} |`,
              `| Decisions Pending | ${productStats.reduce((s, p) => s + (parseInt(p.awaitingOwner) || 0), 0)} |`,
              ``,
              `## Agent Autonomy Metrics (last 7 days)`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Decisions made | ${autonomyMetrics.total} |`,
              `| Auto-approved by committee | ${autonomyMetrics.committeeApproved} (${autonomyMetrics.total > 0 ? Math.round(autonomyMetrics.committeeApproved / autonomyMetrics.total * 100) : 0}%) |`,
              `| SLA-fallback approvals | ${autonomyMetrics.slaFallback} |`,
              `| Escalated to owner | ${autonomyMetrics.escalated} (${escalatedPct}%) |`,
              `| Autonomy % | ${autonomyPct}% |`,
              `| PRs auto-merged (low/med/high) | ${autonomyMetrics.prsMergedLow} / ${autonomyMetrics.prsMergedMed} / ${autonomyMetrics.prsMergedHigh} |`,
              `| Circuit-breakers hit | ${autonomyMetrics.circuitBreakersHit.length > 0 ? autonomyMetrics.circuitBreakersHit.join(', ') : 'none'} |`,
              ``,
              `## 🚨 Anomalies`,
              ``,
              anomalies.length > 0
                ? anomalies.join('\n')
                : `*No anomalies detected.*`,
              ``,
              `## Health Summary`,
              ...productStats.map(p => {
                const issues = [];
                if (parseInt(p.incidents) > 0) issues.push(`🔴 ${p.incidents} active incident(s)`);
                if (parseInt(p.bugs) > 3) issues.push(`🟡 ${p.bugs} open bugs (above threshold)`);
                if (parseInt(p.awaitingOwner) > 3) issues.push(`🟡 ${p.awaitingOwner} decisions pending owner review`);
                return issues.length > 0
                  ? `- **${p.repo}:** ${issues.join(', ')}`
                  : `- **${p.repo}:** ✅ Healthy`;
              }),
              ``,
              `---`,
              `*Last updated: ${now}*`,
              `*Generated by HQ Orchestrator — CreativeWare*`,
            ].join('\n');

            fs.writeFileSync(path.join(ws, 'docs', 'agents', 'DASHBOARD.md'), dashboard);

            // Commit dashboard
            try {
              execSync('git config user.name "CreativeWare Bot"');
              execSync('git config user.email "bot@creative-ware.ai"');
              execSync('git add docs/agents/DASHBOARD.md');
              const diff = execSync('git diff --cached --name-only').toString().trim();
              if (diff) {
                execSync('git commit -m "chore: update cross-product dashboard [skip ci]"');
                execSync('git push origin HEAD:main');
                console.log('📊 Dashboard updated');
              }
            } catch (e) {
              console.log(`Dashboard commit failed: ${e.message}`);
            }

            // Check for decisions pending across products
            const totalAwaiting = productStats.reduce((s, p) => s + (parseInt(p.awaitingOwner) || 0), 0);
            if (totalAwaiting > 5) {
              // Create a reminder issue in HQ
              const { data: existing } = await github.rest.issues.listForRepo({
                owner, repo: hqRepo, state: 'open',
                labels: 'agent/orchestrator', per_page: 5,
              });
              if (!existing.some(i => i.title.includes('Decision Queue'))) {
                await github.rest.issues.create({
                  owner, repo: hqRepo,
                  title: `⚠️ [HQ] Decision Queue Backing Up — ${totalAwaiting} pending`,
                  body: [
                    `## Decision Queue Alert`,
                    ``,
                    `${totalAwaiting} decisions are awaiting @${ownerLogin} review across all products:`,
                    ...productStats.filter(p => parseInt(p.awaitingOwner) > 0).map(p =>
                      `- **${p.repo}:** ${p.awaitingOwner} pending`
                    ),
                    ``,
                    `@${ownerLogin} — please review pending decisions in each product repo.`,
                  ].join('\n'),
                  labels: ['agent/orchestrator', 'needs-owner-approval'],
                  assignees: [ownerLogin],
                });
              }
            }

            // Save orchestrator state
            state.last_run_utc = new Date().toISOString();
            saveState('orchestrator', state);

      - name: "📬 Owner Inbox + Dashboard Anomaly Annotation"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const hqRepo = context.repo.repo;
            const ws = process.env.GITHUB_WORKSPACE;
            const registry = JSON.parse(fs.readFileSync(path.join(ws, 'products', 'registry.json'), 'utf8'));
            const repos = [hqRepo, ...registry.products.map(p => p.repo.replace(/^[^/]+\//, ''))];
            const now = new Date();

            const pending = [];
            for (const repo of repos) {
              try {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'needs-owner-approval', per_page: 100,
                });
                for (const i of issues) {
                  const ageH = Math.round((Date.now() - new Date(i.created_at).getTime()) / 3600000);
                  const tier = (i.labels || []).some(l => l.name === 'risk/high') ? 'high' : (i.labels || []).some(l => l.name === 'risk/low') ? 'low' : 'medium';
                  pending.push({ repo, number: i.number, title: i.title, tier, ageH, url: i.html_url });
                }
              } catch (e) {
                console.log(`inbox scan failed for ${repo}: ${e.message}`);
              }
            }

            const HIGH_PRIORITY_HOURS = 72;
            const MEDIUM_PRIORITY_HOURS = 24;
            const bucket = (x) => x.ageH > HIGH_PRIORITY_HOURS || x.tier === 'high'
              ? 'high'
              : x.ageH >= MEDIUM_PRIORITY_HOURS
                ? 'medium'
                : 'low';
            const groups = { high: [], medium: [], low: [] };
            pending.sort((a, b) => b.ageH - a.ageH).forEach(p => groups[bucket(p)].push(p));

            const row = (i) => `| ${i.repo} | #${i.number} | ${i.title.replace(/\|/g, '\\|')} | ${i.tier} | ${i.ageH}h | ${i.url} |`;
            const inbox = [
              '# 📬 Owner Decisions Inbox',
              '',
              '> Auto-generated by HQ Orchestrator. Single place for all decisions awaiting @fratei.',
              `> Last updated: ${now.toISOString()}`,
              '',
              '## 🔴 High Priority (>72h, escalated, or security)',
              '| Repo | # | Title | Tier | Age | Link |',
              '|---|---:|---|---|---|---|',
              ...(groups.high.length ? groups.high.map(row) : ['| - | - | - | - | - | - |']),
              '',
              '## 🟡 Medium Priority (24-72h)',
              '| Repo | # | Title | Tier | Age | Link |',
              '|---|---:|---|---|---|---|',
              ...(groups.medium.length ? groups.medium.map(row) : ['| - | - | - | - | - | - |']),
              '',
              '## 🟢 Standard (<24h)',
              '| Repo | # | Title | Tier | Age | Link |',
              '|---|---:|---|---|---|---|',
              ...(groups.low.length ? groups.low.map(row) : ['| - | - | - | - | - | - |']),
              '',
              '## Stats',
              `- Total pending: ${pending.length}`,
              `- Median age: ${pending.length ? pending.map(p => p.ageH).sort((a,b)=>a-b)[Math.floor(pending.length/2)] : 0} hours`,
              `- Oldest: ${pending.length ? Math.max(...pending.map(p => p.ageH)) : 0} hours`,
            ].join('\n');
            fs.writeFileSync(path.join(ws, 'OWNER-INBOX.md'), inbox);

            const dashPath = path.join(ws, 'docs', 'agents', 'DASHBOARD.md');
            let dash = fs.readFileSync(dashPath, 'utf8');
            const baselinePath = path.join(ws, 'strategy', 'agent-state', 'dashboard-baseline.json');
            let baseline = fs.existsSync(baselinePath) ? JSON.parse(fs.readFileSync(baselinePath, 'utf8')) : {};
            const anomalies = [];
            const RED_Z_THRESHOLD = 2;
            const YELLOW_Z_THRESHOLD = 1;
            dash = dash.replace(/^\| ([^|]+) \| ([^|]+) \|$/gm, (line, metric, value) => {
              const m = value.match(/-?\d+/);
              if (!m) return line;
              const num = Number(m[0]);
              const history = Array.isArray(baseline[metric]) ? baseline[metric] : [];
              const mean = history.length ? history.reduce((s, n) => s + n, 0) / history.length : num;
              const variance = history.length ? history.reduce((s, n) => s + Math.pow(n - mean, 2), 0) / history.length : 0;
              const std = Math.sqrt(variance) || 1;
              const z = (num - mean) / std;
              const emoji = Math.abs(z) >= RED_Z_THRESHOLD ? '🔴' : Math.abs(z) >= YELLOW_Z_THRESHOLD ? '🟡' : '🟢';
              if (Math.abs(z) >= RED_Z_THRESHOLD) anomalies.push(`- **${metric}:** ${num} (z=${z.toFixed(2)})`);
              baseline[metric] = [...history.slice(-6), num];
              return `| ${metric} | ${emoji} ${value.replace(/^[🟢🟡🔴]\s*/, '')} |`;
            });
            const anomalySection = `\n\n## 🚨 Anomalies\n\n${anomalies.length ? anomalies.join('\n') : '*No red anomalies detected.*'}\n`;
            dash = dash.includes('## 🚨 Anomalies') ? dash.replace(/\n## 🚨 Anomalies[\s\S]*$/m, anomalySection.trimEnd()) : `${dash}${anomalySection}`;
            fs.writeFileSync(dashPath, dash);
            fs.writeFileSync(baselinePath, JSON.stringify(baseline, null, 2) + '\n');

            try {
              execSync('git config user.name \"CreativeWare Bot\"');
              execSync('git config user.email \"bot@creative-ware.ai\"');
              execSync('git add OWNER-INBOX.md docs/agents/DASHBOARD.md strategy/agent-state/dashboard-baseline.json');
              const diff = execSync('git diff --cached --name-only').toString().trim();
              if (diff) execSync('git commit -m \"chore: update owner inbox and dashboard anomalies [skip ci]\"');
            } catch (e) {
              console.log(`owner inbox commit skipped: ${e.message}`);
            }

  # ─── Weekly Strategy Review (Mondays) ─────────────────────────────────
  strategy-review:
    if: >-
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'strategy-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if Monday
        id: day-check
        run: |
          DOW=$(date -u +%u)
          HOUR=$(date -u +%H)
          if [ "$DOW" = "1" ] && [ "$HOUR" -lt "6" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "📋 Weekly Strategy Review"
        if: steps.day-check.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const today = new Date().toISOString().split('T')[0];

            // Read product registry
            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const productRepos = registry.products
              .filter(p => p.status === 'live')
              .map(p => p.repo.replace(/^[^/]+\//, ''));

            // Gather weekly stats per product
            const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
            const productReviews = [];
            for (const prodRepo of productRepos) {
              try {
                const { data: closedIssues } = await github.rest.issues.listForRepo({
                  owner, repo: prodRepo, state: 'closed', since: weekAgo, per_page: 50,
                });
                const { data: mergedPRs } = await github.rest.pulls.list({
                  owner, repo: prodRepo, state: 'closed', sort: 'updated',
                  direction: 'desc', per_page: 30,
                });
                const weekMerged = mergedPRs.filter(pr =>
                  pr.merged_at && pr.merged_at >= weekAgo
                ).length;

                productReviews.push({
                  repo: prodRepo,
                  closedIssues: closedIssues.length,
                  mergedPRs: weekMerged,
                });
              } catch (e) {
                productReviews.push({ repo: prodRepo, closedIssues: '?', mergedPRs: '?' });
              }
            }

            const report = [
              `## 📋 Weekly Strategy Review — ${today}`,
              ``,
              `### Product Performance (Last 7 Days)`,
              ``,
              `| Product | Issues Closed | PRs Merged |`,
              `|---------|---------------|------------|`,
              ...productReviews.map(p => `| ${p.repo} | ${p.closedIssues} | ${p.mergedPRs} |`),
              ``,
              `### Company Health`,
              `- Products: ${productRepos.length}`,
              `- Total issues closed this week: ${productReviews.reduce((s, p) => s + (parseInt(p.closedIssues) || 0), 0)}`,
              `- Total PRs merged this week: ${productReviews.reduce((s, p) => s + (parseInt(p.mergedPRs) || 0), 0)}`,
              ``,
              `### Strategic Priorities`,
              `> Review company strategy at \`strategy/README.md\``,
              ``,
              `---`,
              `*Generated by HQ Orchestrator — CreativeWare*`,
            ].join('\n');

            // Create or update weekly report issue
            const title = `[REPORT] Weekly Strategy Review — ${today}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'agent/orchestrator', per_page: 10,
            });
            const existingReport = existing.find(i => i.title.startsWith('[REPORT] Weekly'));

            if (existingReport) {
              await github.rest.issues.update({
                owner, repo, issue_number: existingReport.number,
                body: report,
              });
              // Close previous week
              await github.rest.issues.update({
                owner, repo, issue_number: existingReport.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner, repo, title, body: report,
              labels: ['agent/orchestrator', 'report'],
            });
            console.log('📋 Weekly strategy review created');
