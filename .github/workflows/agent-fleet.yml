name: "🏢 CreativeWare Agent Fleet — C-Suite Operations"

# Company-level C-suite agents scanning ALL product repos.
# - CPO: scans product strategies, creates opportunity issues
# - CMO: market analysis — trends, whitespace, product evolution (weekly)
# - CFO: financial review
# - CTO: technical review
# Runs every 2 hours from HQ, reads product registry.

on:
  schedule:
    - cron: "15 */6 * * *"  # Every 6 hours (reduced from 2h)
  workflow_dispatch:
    inputs:
      agent:
        description: "Which agent to run"
        type: choice
        options:
          - "all"
          - "cpo-opportunities"
          - "cmo-market-analysis"
          - "cfo-financial-review"
          - "cto-tech-review"
        default: "all"
  repository_dispatch:
    types: [agent-fleet-trigger]

permissions:
  contents: write
  issues: write

concurrency:
  group: agent-fleet
  cancel-in-progress: true

jobs:
  cpo-opportunities:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      inputs.agent == 'all' ||
      inputs.agent == 'cpo-opportunities'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: "📦 CPO Agent — Scan All Products for Opportunities"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const ws = process.env.GITHUB_WORKSPACE;
            const cfg = require(`${ws}/.github/scripts/agent-config.js`);
            const { classifyRisk } = require(`${ws}/.github/scripts/classify-risk.js`);
            const { loadState, saveState } = require(`${ws}/.github/scripts/agent-state.js`);
            const owner = context.repo.owner;

            // ── Load CPO agent state ──────────────────────────────────────
            const state = loadState('cpo');
            console.log(`📦 CPO state loaded: last_run=${state.last_run_utc}`);

            // ── Read recent outcomes for decision history (last 30 days) ──
            let recentDecisionHistory = '';
            try {
              const now = new Date();
              const months = [
                `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, '0')}`,
              ];
              if (now.getUTCDate() <= 5) {
                const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                months.push(`${prev.getUTCFullYear()}-${String(prev.getUTCMonth() + 1).padStart(2, '0')}`);
              }
              const rows = [];
              for (const ym of months) {
                const fp = path.join(ws, 'strategy', 'outcomes', `${ym}.md`);
                if (fs.existsSync(fp)) {
                  const lines = fs.readFileSync(fp, 'utf-8').split('\n');
                  rows.push(...lines.filter(l => l.startsWith('|') && !l.includes('Date (UTC)')).slice(-10));
                }
              }
              if (rows.length > 0) {
                recentDecisionHistory = `### 📊 Recent Decision History (last 30 days)\n\n| Date (UTC) | Kind | Summary | Result |\n|------------|------|---------|--------|\n${rows.slice(-10).join('\n')}\n`;
              }
            } catch (e) {
              console.log(`📊 Could not load outcomes: ${e.message}`);
            }

            // ── Read latest web research brief for real-world evidence ──
            let latestResearch = '';
            try {
              const researchDir = path.join(ws, 'strategy', 'research');
              const files = fs.readdirSync(researchDir)
                .filter(f => f.match(/^\d{4}-\d{2}-\d{2}\.md$/))
                .sort()
                .reverse();
              if (files.length > 0) {
                const content = fs.readFileSync(path.join(researchDir, files[0]), 'utf-8');
                const takeaways = content.match(/## 🎯 Actionable Takeaways\n([\s\S]*?)(?=\n---)/);
                const marketSection = content.match(/## 📰 Market Signals\n([\s\S]*?)(?=\n## 👥)/);
                const userSection = content.match(/## 👥 User Signals\n([\s\S]*?)(?=\n## 🎯 Competitor)/);
                latestResearch = [
                  `### 🔬 Latest Web Research (${files[0].replace('.md', '')})`,
                  '',
                  takeaways ? takeaways[1].trim() : '',
                  '',
                  marketSection ? '**Key market signals:**\n' + marketSection[1].trim().split('\n').slice(0, 5).join('\n') : '',
                  '',
                  userSection ? '**Key user signals:**\n' + userSection[1].trim().split('\n').slice(0, 5).join('\n') : '',
                ].filter(Boolean).join('\n');
                console.log(`📖 Loaded research brief: ${files[0]} (${latestResearch.length} chars)`);
              }
            } catch (e) {
              console.log(`📖 No research briefs found: ${e.message}`);
            }

            const registry = JSON.parse(fs.readFileSync(path.join(ws, 'products', 'registry.json'), 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');
            const ownerLogin = cfg.getOwner();

            const summarize = (text, max = 300) => {
              const n = (text || '').replace(/\s+/g, ' ').trim();
              if (!n) return 'See brief for details';
              if (n.length <= max) return n;
              const t = n.slice(0, max);
              const b = Math.max(t.lastIndexOf('. '), t.lastIndexOf('! '), t.lastIndexOf('? '));
              return `${n.slice(0, b > max * 0.6 ? b + 1 : max).trimEnd()}…`;
            };

            let totalCreated = 0;

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              console.log(`\n📦 Scanning ${repo}...`);

              // Read opportunity briefs from product repo
              let files = [];
              try {
                const { data: contents } = await github.rest.repos.getContent({
                  owner, repo, path: 'strategy/opportunities',
                });
                files = contents.filter(f => f.name.endsWith('.md') && f.name !== 'INDEX.md' && f.name !== 'README.md');
              } catch (e) {
                console.log(`  No opportunities dir in ${repo}: ${e.message}`);
                continue;
              }

              // Get existing opportunity issues in product repo
              const { data: existingIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'all', labels: 'opportunity', per_page: 100,
              });
              const existingTitles = new Set(existingIssues.map(i => i.title));

              let created = 0;
              for (const file of files) {
                // Read file content
                let content;
                try {
                  const { data: fileData } = await github.rest.repos.getContent({
                    owner, repo, path: `strategy/opportunities/${file.name}`,
                  });
                  content = Buffer.from(fileData.content, 'base64').toString('utf-8');
                } catch { continue; }

                const titleMatch = content.match(/^#\s+(.+)/m);
                if (!titleMatch) continue;
                const briefTitle = titleMatch[1].replace(/^Opportunity Brief:\s*/i, '').trim();
                const issueTitle = `[OPPORTUNITY] ${briefTitle}`;

                if (existingTitles.has(issueTitle)) {
                  console.log(`  Skipping (exists): ${issueTitle}`);
                  continue;
                }

                const problemMatch = content.match(/## Problem\n([\s\S]*?)(?=\n##)/);
                const recMatch = content.match(/## Recommendation\n([\s\S]*?)(?=\n##|\n$)/);

                // ── Classify risk ──────────────────────────────────────────
                const riskTier = classifyRisk({
                  title: briefTitle,
                  body: content,
                  files: [file.name],
                  labels: [],
                });
                console.log(`  Risk classification: ${riskTier} for "${briefTitle}"`);

                // ── Build issue body ───────────────────────────────────────
                const isHighRisk = riskTier === 'high';
                const approvalNote = isHighRisk
                  ? `**Requires:** @${ownerLogin} approval (high-risk tier)`
                  : `**Approval Path:** Agent Committee (CPO / CTO / CFO) — \`${riskTier}\` tier`;
                const nextSteps = isHighRisk
                  ? [
                    `### Next Steps`,
                    `1. @${ownerLogin}: Review the full brief`,
                    `2. Comment with approval, modifications, or rejection`,
                    `3. Close this issue to trigger autonomous implementation`,
                  ]
                  : [
                    `### Next Steps`,
                    `1. Agent Committee (CPO/CTO/CFO) will vote within ${riskTier === 'low' ? '6' : '24'}h`,
                    `2. If approved, implementation will be dispatched automatically`,
                    `3. If any voter defers to owner, @${ownerLogin} will be notified`,
                  ];

                const body = [
                  `## 📋 Opportunity Brief: ${briefTitle}`,
                  ``,
                  `**Agent:** 📦 CPO Agent (HQ)`,
                  `**Product:** ${product.name} (\`${product.repo}\`)`,
                  `**Brief:** \`strategy/opportunities/${file.name}\``,
                  `**Risk Tier:** \`${riskTier}\``,
                  approvalNote,
                  ``,
                  `### Problem`, summarize(problemMatch ? problemMatch[1] : ''),
                  ``, `### Recommendation`, summarize(recMatch ? recMatch[1] : ''),
                  ``,
                  recentDecisionHistory || '',
                  latestResearch ? `### 🔬 Supporting Web Research\n\n${latestResearch}\n` : '',
                  ...nextSteps,
                  ``,
                  `---`,
                  `*Generated by CPO Agent (HQ) — CreativeWare*`,
                ].filter(s => s !== undefined).join('\n');

                // ── Create issue with tier-appropriate labels ──────────────
                const issueLabels = ['opportunity', 'agent/cpo', `risk/${riskTier}`];
                const issueAssignees = [];
                if (isHighRisk) {
                  issueLabels.push('needs-owner-approval');
                  issueAssignees.push(ownerLogin);
                } else {
                  issueLabels.push('committee-vote');
                }

                try {
                  const { data: issue } = await github.rest.issues.create({
                    owner, repo, title: issueTitle, body,
                    labels: issueLabels,
                    assignees: issueAssignees,
                  });
                  console.log(`  ✅ Created ${repo}#${issue.number}: ${issueTitle} [${riskTier}]`);
                  created++;
                  totalCreated++;
                  if (created >= 3) break;
                } catch (err) {
                  console.error(`  Failed: ${file.name}: ${err.message}`);
                }
              }
              console.log(`  CPO: created ${created} opportunities in ${repo}`);
            }

            // ── Update CPO agent state ─────────────────────────────────────
            state.last_run_utc = new Date().toISOString();
            state.metrics_30d.decisions_proposed = (state.metrics_30d.decisions_proposed || 0) + totalCreated;
            saveState('cpo', state);

  cmo-market-analysis:
    if: >-
      inputs.agent == 'cmo-market-analysis' ||
      inputs.agent == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "📊 CMO Agent — Trigger Market Analysis"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'market-analysis.yml',
              ref: 'main',
              inputs: { analysis_type: 'all' },
            });
            console.log('📊 CMO: market analysis workflow triggered');

  cfo-review:
    if: >-
      github.event_name == 'schedule' ||
      inputs.agent == 'all' ||
      inputs.agent == 'cfo-financial-review'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: "💰 CFO Agent — Cross-Product Financial Review"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            // Adaptive: only run detailed review every 12h (skip on odd hours)
            const hour = new Date().getUTCHours();
            if (hour % 12 !== 0 && '${{ github.event_name }}' === 'schedule') {
              console.log('💰 CFO: skipping — detailed review runs every 12h');
              return;
            }

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: openPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 50,
                });
                const { data: openIssues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', per_page: 100,
                });
                const engineeringIssues = openIssues.filter(i =>
                  i.labels.some(l => l.name === 'engineering')
                ).length;

                console.log(`💰 ${repo}: ${openPRs.length} PRs, ${engineeringIssues} engineering tasks`);
              } catch (e) {
                console.log(`💰 ${repo}: scan failed — ${e.message}`);
              }
            }

  cto-review:
    if: >-
      github.event_name == 'schedule' ||
      inputs.agent == 'all' ||
      inputs.agent == 'cto-tech-review'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: "🔧 CTO Agent — Cross-Product Tech Review"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const registry = JSON.parse(fs.readFileSync('products/registry.json', 'utf-8'));
            const products = registry.products.filter(p => p.status === 'live');

            // Adaptive: detailed review every 12h
            const hour = new Date().getUTCHours();
            if (hour % 12 !== 0 && '${{ github.event_name }}' === 'schedule') {
              console.log('🔧 CTO: skipping — detailed review runs every 12h');
              return;
            }

            for (const product of products) {
              const repo = product.repo.replace(/^[^/]+\//, '');
              try {
                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner, repo, status: 'failure', per_page: 5,
                });
                const recentFailures = runs.workflow_runs.filter(r => {
                  const age = Date.now() - new Date(r.created_at).getTime();
                  return age < 24 * 3600000;
                });

                if (recentFailures.length > 3) {
                  console.log(`🔧 ⚠️ ${repo}: ${recentFailures.length} CI failures in 24h`);
                } else {
                  console.log(`🔧 ${repo}: CI healthy (${recentFailures.length} failures in 24h)`);
                }
              } catch (e) {
                console.log(`🔧 ${repo}: scan failed — ${e.message}`);
              }
            }
