name: reusable-product-fleet
on:
  workflow_call:
    inputs:
      registry_path:
        description: Path to products registry
        required: false
        default: products/registry.json
        type: string
permissions:
  contents: read
  issues: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fratei/creative-ware-hq/.github/actions/load-config@v1
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reg = JSON.parse(fs.readFileSync('${{ inputs.registry_path }}','utf8'));
            console.log(`Scanning ${reg.products.length} products`);
