name: notify-cron-failure
description: >-
  Open (or comment on) a tracking issue when a scheduled workflow run fails, so
  silent cron failures become loud instead of rotting unnoticed.
inputs:
  github-token:
    description: Token used to create/comment the failure issue.
    required: false
    default: ${{ github.token }}
  labels:
    description: Comma-separated labels applied to the failure issue.
    required: false
    default: agent/orchestrator,needs-owner-approval,cron-failure
runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const labels = `${{ inputs.labels }}`.split(',').map(s => s.trim()).filter(Boolean);
          const dedupeLabel = labels[labels.length - 1] || 'cron-failure';
          const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
          const title = `[CRON FAILURE] ${context.workflow} scheduled run failed`;
          const body = [
            `The scheduled run of **${context.workflow}** failed.`,
            '',
            `- Run: ${runUrl}`,
            `- Workflow ref: \`${process.env.GITHUB_WORKFLOW_REF || context.workflow}\``,
            `- Triggered: ${context.eventName} @ ${new Date().toISOString()}`,
            '',
            'Silent cron failures rot unnoticed; this issue makes the failure loud. ' +
            'Investigate the linked run, fix the root cause, then close this issue.',
          ].join('\n');
          const existing = await github.paginate(github.rest.issues.listForRepo, {
            owner, repo, state: 'open', labels: dedupeLabel, per_page: 100,
          });
          const dupe = existing.find(i => i.title === title);
          if (dupe) {
            await github.rest.issues.createComment({
              owner, repo, issue_number: dupe.number,
              body: `Another scheduled run failed: ${runUrl}`,
            });
            console.log(`Commented on existing cron-failure issue #${dupe.number}`);
          } else {
            const created = await github.rest.issues.create({ owner, repo, title, body, labels });
            console.log(`Opened cron-failure issue #${created.data.number}`);
          }
